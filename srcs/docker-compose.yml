networks:
  mynetwork:
    name: "mynetwork"

# configure named volumes that can be reused across multiple services
volumes:
  database:
    name: database
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./database

  # wordpress:
  #   name: wordpress

# this top-level secrets section defines the variables userpass and rootpass, and provides the file that populates their values
# the deployment of each container means Docker creates a bind mount under /run/secrets/<secret_name>
secrets:
  userpass:
    file: secrets/db_password.txt
  rootpass:
    file: secrets/db_root_password.txt
